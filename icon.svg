<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a6fc4"/>
      <stop offset="100%" stop-color="#0a3d7a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- 「愛知県市町村」62px -->
  <text x="256" y="140" text-anchor="middle"
        font-family="'Noto Sans JP','Hiragino Sans',sans-serif"
        font-size="62" font-weight="900" fill="white"
        letter-spacing="1">愛知県市町村</text>
  <!-- 黄色下線 -->
  <rect x="52" y="152" width="408" height="7" rx="3" fill="#FFD700"/>

  <!-- 「シルエット」62px -->
  <text x="256" y="262" text-anchor="middle"
        font-family="'Noto Sans JP','Hiragino Sans',sans-serif"
        font-size="62" font-weight="900" fill="white"
        letter-spacing="1">シルエット</text>

  <!-- 「クイズ」62px -->
  <text x="256" y="372" text-anchor="middle"
        font-family="'Noto Sans JP','Hiragino Sans',sans-serif"
        font-size="62" font-weight="900" fill="white"
        letter-spacing="1">クイズ</text>
</svg>
