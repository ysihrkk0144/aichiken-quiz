<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#6c5ce7">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>愛知県クイズ</title>
<style>
:root {
  --primary:    #6c5ce7;
  --primary-dk: #4a3fb5;
  --primary-lt: #eeeaff;
  --correct:    #06d6a0;
  --correct-lt: #d0fff4;
  --wrong:      #ff6b6b;
  --wrong-lt:   #ffe0e0;
  --bg:         #f8f7ff;
  --surface:    #ffffff;
  --border:     #e0ddf5;
  --text:       #1a1a2e;
  --text-dim:   #7a7a9a;
  --shadow-sm:  0 2px 8px rgba(108,92,231,0.10);
  --shadow-md:  0 4px 20px rgba(108,92,231,0.15);
  --radius:     16px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: 24px;
}

/* ─── ヘッダー ─── */
.app-header {
  width: 100%;
  background: var(--primary);
  color: #fff;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 12px rgba(108,92,231,0.30);
  position: sticky; top: 0; z-index: 100;
}
.app-title {
  font-size: 15px;
  font-weight: 900;
  letter-spacing: 0.04em;
  line-height: 1.3;
}
.score-badge {
  background: rgba(255,255,255,0.20);
  border: 1.5px solid rgba(255,255,255,0.40);
  border-radius: 999px;
  padding: 5px 14px;
  font-size: 15px;
  font-weight: 900;
  white-space: nowrap;
  letter-spacing: 0.04em;
}

/* ─── メインコンテンツ ─── */
.main {
  width: 100%;
  max-width: 440px;
  padding: 16px 14px 0;
  display: flex;
  flex-direction: column;
  gap: 13px;
}

/* ─── 進捗バー ─── */
.progress-wrap {
  background: var(--border);
  border-radius: 999px;
  height: 6px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), #a29bfe);
  border-radius: 999px;
  transition: width 0.4s ease;
}

/* ─── 問題ラベル ─── */
.q-label {
  text-align: center;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-dim);
  letter-spacing: 0.06em;
}

/* ─── シルエット枠 ─── */
.silhouette-box {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-md);
  aspect-ratio: 1 / 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  transition: border-color 0.3s, background 0.3s;
}
.silhouette-box.state-correct {
  border-color: var(--correct);
  background: var(--correct-lt);
}
.silhouette-box.state-wrong {
  border-color: var(--wrong);
  background: var(--wrong-lt);
}
.silhouette-svg {
  width: 88%;
  height: 88%;
  display: block;
}
.silhouette-svg path {
  fill: var(--primary);
  stroke: var(--primary-dk);
  stroke-width: 0.3;
  stroke-linejoin: round;
  transition: fill 0.35s;
}
.silhouette-box.state-correct .silhouette-svg path { fill: var(--correct); stroke: #04a880; }
.silhouette-box.state-wrong   .silhouette-svg path { fill: var(--wrong);   stroke: #e05555; }

/* ─── 結果バナー ─── */
.result-row {
  min-height: 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}
.result-text {
  font-size: 18px;
  font-weight: 900;
  letter-spacing: 0.06em;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 0.2s, transform 0.2s;
}
.result-text.show { opacity: 1; transform: none; }
.result-text.correct { color: var(--correct); }
.result-text.wrong   { color: var(--wrong); }
.answer-label {
  font-size: 12px;
  color: var(--text-dim);
  font-weight: 700;
  min-height: 16px;
}

/* ─── 選択肢 ─── */
.choices {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.choice-btn {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif;
  font-size: clamp(12px, 3.5vw, 14px);
  font-weight: 700;
  padding: 14px 8px;
  cursor: pointer;
  line-height: 1.3;
  letter-spacing: 0.02em;
  box-shadow: var(--shadow-sm);
  transition: background 0.12s, border-color 0.12s, transform 0.08s, box-shadow 0.12s;
  -webkit-tap-highlight-color: transparent;
}
.choice-btn:active:not(:disabled) { transform: scale(0.95); }
.choice-btn:disabled { cursor: default; }
.choice-btn.state-correct {
  background: var(--correct-lt);
  border-color: var(--correct);
  color: #047d5e;
}
.choice-btn.state-wrong {
  background: var(--wrong-lt);
  border-color: var(--wrong);
  color: #c0392b;
}
.choice-btn.state-dim { opacity: 0.28; }

/* ─── 次へボタン ─── */
.next-btn {
  display: none;
  width: 100%;
  padding: 16px;
  border-radius: var(--radius);
  border: none;
  background: linear-gradient(135deg, var(--primary), #a29bfe);
  color: #fff;
  font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif;
  font-size: 16px;
  font-weight: 900;
  letter-spacing: 0.06em;
  cursor: pointer;
  box-shadow: 0 4px 18px rgba(108,92,231,0.35);
  transition: transform 0.12s, box-shadow 0.12s;
  -webkit-tap-highlight-color: transparent;
}
.next-btn.show { display: block; }
.next-btn:active { transform: scale(0.97); }

/* ─── 結果画面 ─── */
.result-screen {
  display: none;
  width: 100%;
  max-width: 440px;
  padding: 32px 20px;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  text-align: center;
}
.result-screen.show { display: flex; }
.result-title {
  font-size: 22px;
  font-weight: 900;
  color: var(--primary);
  letter-spacing: 0.05em;
}
.result-score-big {
  font-size: 64px;
  font-weight: 900;
  color: var(--primary);
  line-height: 1;
  letter-spacing: -0.02em;
}
.result-score-big span {
  font-size: 24px;
  color: var(--text-dim);
  font-weight: 700;
}
.result-comment {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-dim);
  line-height: 1.6;
}
.retry-btn {
  width: 100%;
  max-width: 320px;
  padding: 18px;
  border-radius: var(--radius);
  border: none;
  background: linear-gradient(135deg, var(--primary), #a29bfe);
  color: #fff;
  font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif;
  font-size: 17px;
  font-weight: 900;
  letter-spacing: 0.06em;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(108,92,231,0.35);
  -webkit-tap-highlight-color: transparent;
}

/* ─── ローディング ─── */
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  padding: 60px 20px;
  color: var(--text-dim);
  font-weight: 700;
  font-size: 14px;
}
.spinner {
  width: 36px; height: 36px;
  border: 4px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── アニメーション ─── */
@keyframes pop-in {
  0%   { transform: scale(0.80); opacity: 0; }
  65%  { transform: scale(1.04); }
  100% { transform: scale(1);    opacity: 1; }
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-8px); }
  40%     { transform: translateX(8px); }
  60%     { transform: translateX(-5px); }
  80%     { transform: translateX(5px); }
}
.anim-pop   { animation: pop-in 0.32s cubic-bezier(0.34,1.56,0.64,1) both; }
.anim-shake { animation: shake 0.38s ease; }

/* ============================================================
   ここから PWA / SW 関連の新規UI
   ============================================================ */

/* ─── キャッシュ完了バナー（画面上部） ─── */
.cache-banner {
  position: fixed;
  top: -80px;
  left: 0; right: 0;
  z-index: 9000;
  color: #fff;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.03em;
  text-align: left;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  box-shadow: 0 3px 14px rgba(0,0,0,0.25);
  transition: top 0.4s cubic-bezier(0.34,1.3,0.64,1);
}
.cache-banner.show { top: 0; }
.cache-banner.ok   { background: #06b88a; }
.cache-banner.warn { background: #e67e22; }
.cache-banner .msg { flex: 1; line-height: 1.4; }
.cache-banner .close-x {
  background: rgba(255,255,255,0.25);
  border: none;
  color: #fff;
  width: 26px; height: 26px;
  border-radius: 50%;
  font-size: 14px;
  font-weight: 900;
  cursor: pointer;
  flex-shrink: 0;
}

/* ─── 更新確認バナー（画面下部） ─── */
.update-banner {
  position: fixed;
  bottom: -120px;
  left: 0; right: 0;
  z-index: 9100;
  background: #2d3142;
  color: #fff;
  padding: 16px 18px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  box-shadow: 0 -4px 18px rgba(0,0,0,0.30);
  transition: bottom 0.4s cubic-bezier(0.34,1.3,0.64,1);
}
.update-banner.show { bottom: 0; }
.update-banner .msg {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.02em;
}
.update-banner .btn-row {
  display: flex;
  gap: 10px;
}
.update-banner button {
  flex: 1;
  padding: 11px;
  border-radius: 10px;
  border: none;
  font-weight: 900;
  font-size: 13px;
  letter-spacing: 0.04em;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.update-banner .btn-update {
  background: var(--correct);
  color: #053b2c;
}
.update-banner .btn-later {
  background: rgba(255,255,255,0.18);
  color: #fff;
}

/* ─── 診断パネル起動ボタン（右下FAB） ─── */
.diag-fab {
  position: fixed;
  right: 16px;
  bottom: 16px;
  z-index: 8000;
  width: 50px; height: 50px;
  border-radius: 50%;
  background: var(--primary-dk);
  color: #fff;
  border: none;
  font-size: 22px;
  box-shadow: 0 4px 14px rgba(74,63,181,0.45);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.diag-fab:active { transform: scale(0.92); }

/* ─── 診断パネル（全画面） ─── */
.diag-panel {
  position: fixed;
  inset: 0;
  z-index: 9500;
  background: #16161f;
  color: #e8e8f0;
  display: none;
  flex-direction: column;
  font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', monospace, sans-serif;
}
.diag-panel.show { display: flex; }
.diag-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 18px;
  background: #1f1f2c;
  border-bottom: 1px solid #34344a;
}
.diag-header h2 {
  font-size: 15px;
  font-weight: 900;
  letter-spacing: 0.05em;
}
.diag-close {
  background: rgba(255,255,255,0.10);
  border: none;
  color: #fff;
  width: 32px; height: 32px;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}
.diag-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px 18px 100px;
}
.diag-section {
  margin-bottom: 16px;
  background: #1f1f2c;
  border-radius: 12px;
  padding: 12px 14px;
  border: 1px solid #2c2c3d;
}
.diag-section h3 {
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 0.08em;
  color: #9d97e8;
  margin-bottom: 8px;
  text-transform: uppercase;
}
.diag-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
  font-size: 13px;
  padding: 5px 0;
  border-bottom: 1px solid #26263580;
  word-break: break-all;
}
.diag-row:last-child { border-bottom: none; }
.diag-row .k { color: #9090a8; font-weight: 700; flex-shrink: 0; }
.diag-row .v { color: #f0f0fa; font-weight: 700; text-align: right; }
.diag-row .v.ok   { color: #06d6a0; }
.diag-row .v.bad  { color: #ff6b6b; }
.diag-row .v.warn { color: #ffb84d; }
.diag-url-list {
  font-size: 11px;
  color: #b8b8d0;
  line-height: 1.7;
  word-break: break-all;
  max-height: 180px;
  overflow-y: auto;
  background: #14141d;
  border-radius: 8px;
  padding: 8px 10px;
  margin-top: 6px;
}
.diag-url-list div { padding: 2px 0; }
.diag-actions {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  z-index: 9600;
  display: flex;
  gap: 10px;
  padding: 14px 18px calc(14px + env(safe-area-inset-bottom));
  background: #1f1f2c;
  border-top: 1px solid #34344a;
}
.diag-actions button {
  flex: 1;
  padding: 13px;
  border-radius: 10px;
  border: none;
  font-weight: 900;
  font-size: 13px;
  letter-spacing: 0.03em;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.diag-actions .btn-refresh {
  background: #34344a;
  color: #fff;
}
.diag-actions .btn-checkupdate {
  background: var(--primary);
  color: #fff;
}
</style>
</head>
<body>

<!-- キャッシュ完了バナー -->
<div class="cache-banner" id="cache-banner">
  <div class="msg" id="cache-banner-msg"></div>
  <button class="close-x" id="cache-banner-close">✕</button>
</div>

<!-- 更新確認バナー -->
<div class="update-banner" id="update-banner">
  <div class="msg">🆕 新しいバージョンがあります</div>
  <div class="btn-row">
    <button class="btn-update" id="update-now-btn">更新する</button>
    <button class="btn-later" id="update-later-btn">あとで</button>
  </div>
</div>

<!-- ヘッダー -->
<header class="app-header">
  <div class="app-title">愛知県<br>市町村シルエットクイズ</div>
  <div class="score-badge" id="score-badge">0&thinsp;／&thinsp;0</div>
</header>

<!-- ローディング -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <div>地図データを読み込み中...</div>
</div>

<!-- クイズ画面 -->
<div class="main" id="quiz-screen" style="display:none;">
  <div class="progress-wrap">
    <div class="progress-bar" id="progress-bar" style="width:0%"></div>
  </div>
  <div class="q-label" id="q-label">第1問 ／ 54問</div>

  <div class="silhouette-box" id="silhouette-box">
    <svg class="silhouette-svg" id="silhouette-svg"
         xmlns="http://www.w3.org/2000/svg"
         preserveAspectRatio="xMidYMid meet"></svg>
  </div>

  <div class="result-row">
    <div class="result-text" id="result-text"></div>
    <div class="answer-label" id="answer-label"></div>
  </div>

  <div class="choices" id="choices"></div>

  <button class="next-btn" id="next-btn">次の問題へ　→</button>
</div>

<!-- 結果画面 -->
<div class="result-screen" id="result-screen">
  <div class="result-title">クイズ完了！</div>
  <div class="result-score-big" id="result-score-big">
    0<span>&thinsp;／&thinsp;54</span>
  </div>
  <div class="result-comment" id="result-comment"></div>
  <button class="retry-btn" id="retry-btn">もう一度挑戦する</button>
</div>

<!-- 診断パネル起動FAB -->
<button class="diag-fab" id="diag-fab" aria-label="診断パネル">🔧</button>

<!-- 診断パネル -->
<div class="diag-panel" id="diag-panel">
  <div class="diag-header">
    <h2>🔧 PWA診断パネル</h2>
    <button class="diag-close" id="diag-close">✕</button>
  </div>
  <div class="diag-body" id="diag-body">
    <!-- JSで動的に内容を描画 -->
  </div>
  <div class="diag-actions">
    <button class="btn-refresh" id="diag-refresh-btn">🔄 再取得</button>
    <button class="btn-checkupdate" id="diag-checkupdate-btn">🌐 最新版を確認</button>
  </div>
</div>

<script>
// ─── グローバル変数 ───
var topoData = null;
var municipalities = [];
var questionOrder = [];
var currentQ = 0;
var correctCount = 0;
var totalAnswered = 0;
var answered = false;
var currentName = '';

// ─── TopoJSONデコード ───
function decodeArc(arcData, scale, translate) {
  var x = 0, y = 0;
  var coords = [];
  for (var i = 0; i < arcData.length; i++) {
    x += arcData[i][0];
    y += arcData[i][1];
    var lon = x * scale[0] + translate[0];
    var lat = y * scale[1] + translate[1];
    coords.push([lon, lat]);
  }
  return coords;
}

function getArcCoords(arcId, arcs, scale, translate) {
  var reversed = arcId < 0;
  var idx = reversed ? ~arcId : arcId;
  var coords = decodeArc(arcs[idx], scale, translate);
  if (reversed) coords = coords.reverse();
  return coords;
}

function getRings(geom, arcs, scale, translate) {
  var rings = [];
  if (geom.type === 'Polygon') {
    for (var i = 0; i < geom.arcs.length; i++) {
      var ring = [];
      for (var j = 0; j < geom.arcs[i].length; j++) {
        var coords = getArcCoords(geom.arcs[i][j], arcs, scale, translate);
        ring = ring.concat(coords);
      }
      rings.push(ring);
    }
  } else if (geom.type === 'MultiPolygon') {
    for (var pi = 0; pi < geom.arcs.length; pi++) {
      for (var ri = 0; ri < geom.arcs[pi].length; ri++) {
        var ring = [];
        for (var ai = 0; ai < geom.arcs[pi][ri].length; ai++) {
          var coords = getArcCoords(geom.arcs[pi][ri][ai], arcs, scale, translate);
          ring = ring.concat(coords);
        }
        rings.push(ring);
      }
    }
  }
  return rings;
}

// ─── SVGパス生成 ───
function makeSVGPath(rings, toSVG) {
  var d = '';
  for (var i = 0; i < rings.length; i++) {
    var ring = rings[i];
    if (ring.length < 2) continue;
    var pt0 = toSVG(ring[0][0], ring[0][1]);
    d += 'M ' + pt0[0].toFixed(2) + ',' + pt0[1].toFixed(2);
    for (var j = 1; j < ring.length; j++) {
      var pt = toSVG(ring[j][0], ring[j][1]);
      d += ' L ' + pt[0].toFixed(2) + ',' + pt[1].toFixed(2);
    }
    d += ' Z';
  }
  return d;
}

// ─── シルエット描画 ───
function drawSilhouette(name) {
  var geom = null;
  var geoms = topoData.objects.municipalities.geometries;
  for (var i = 0; i < geoms.length; i++) {
    if (geoms[i].properties.name === name) { geom = geoms[i]; break; }
  }
  if (!geom) return;

  var scale     = topoData.transform.scale;
  var translate = topoData.transform.translate;
  var arcs      = topoData.arcs;

  var rings = getRings(geom, arcs, scale, translate);
  if (rings.length === 0) return;

  var minLon = Infinity, maxLon = -Infinity;
  var minLat = Infinity, maxLat = -Infinity;
  for (var ri = 0; ri < rings.length; ri++) {
    for (var ci = 0; ci < rings[ri].length; ci++) {
      var lon = rings[ri][ci][0], lat = rings[ri][ci][1];
      if (lon < minLon) minLon = lon;
      if (lon > maxLon) maxLon = lon;
      if (lat < minLat) minLat = lat;
      if (lat > maxLat) maxLat = lat;
    }
  }

  var dLon = maxLon - minLon || 0.01;
  var dLat = maxLat - minLat || 0.01;
  var pad  = Math.max(dLon, dLat) * 0.06;

  var VW = 100, VH = 100;
  function toSVG(lon, lat) {
    var x = (lon - (minLon - pad)) / (dLon + pad * 2) * VW;
    var y = VH - (lat - (minLat - pad)) / (dLat + pad * 2) * VH;
    return [x, y];
  }

  var svg = document.getElementById('silhouette-svg');
  svg.setAttribute('viewBox', '0 0 ' + VW + ' ' + VH);

  while (svg.firstChild) svg.removeChild(svg.firstChild);

  var d = makeSVGPath(rings, toSVG);
  var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('d', d);
  svg.appendChild(path);

  svg.classList.remove('anim-pop');
  void svg.offsetWidth;
  svg.classList.add('anim-pop');
}

// ─── シャッフル ───
function shuffleArray(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

// ─── 選択肢生成 ───
function buildChoices(correctName) {
  var others = [];
  for (var i = 0; i < municipalities.length; i++) {
    if (municipalities[i] !== correctName) others.push(municipalities[i]);
  }
  others = shuffleArray(others).slice(0, 3);
  return shuffleArray([correctName].concat(others));
}

// ─── 問題表示 ───
function showQuestion() {
  if (currentQ >= questionOrder.length) {
    showResult();
    return;
  }

  answered = false;
  currentName = municipalities[questionOrder[currentQ]];

  var box = document.getElementById('silhouette-box');
  box.classList.remove('state-correct', 'state-wrong', 'anim-shake');

  var rt = document.getElementById('result-text');
  rt.className = 'result-text';
  rt.textContent = '';
  document.getElementById('answer-label').textContent = '';

  var pct = (currentQ / questionOrder.length * 100).toFixed(1);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('q-label').textContent =
    '第' + (currentQ + 1) + '問 ／ ' + questionOrder.length + '問';

  drawSilhouette(currentName);

  var choices = buildChoices(currentName);
  var container = document.getElementById('choices');
  container.innerHTML = '';
  for (var i = 0; i < choices.length; i++) {
    (function(name) {
      var btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = name;
      btn.addEventListener('click', function() { onAnswer(name, btn); });
      container.appendChild(btn);
    })(choices[i]);
  }

  document.getElementById('next-btn').classList.remove('show');
}

// ─── 回答処理 ───
function onAnswer(chosen, btn) {
  if (answered) return;
  answered = true;
  totalAnswered++;

  var ok = chosen === currentName;
  if (ok) correctCount++;

  var box = document.getElementById('silhouette-box');
  box.classList.add(ok ? 'state-correct' : 'state-wrong');
  if (!ok) {
    box.classList.add('anim-shake');
    box.addEventListener('animationend', function() {
      box.classList.remove('anim-shake');
    }, { once: true });
  }

  var rt = document.getElementById('result-text');
  rt.textContent = ok ? '✓ 正解！' : '✗ 不正解';
  rt.className = 'result-text show ' + (ok ? 'correct' : 'wrong');

  if (!ok) {
    document.getElementById('answer-label').textContent =
      '正解は「' + currentName + '」です';
  }

  var btns = document.getElementById('choices').querySelectorAll('.choice-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].disabled = true;
    if (btns[i].textContent === currentName) {
      btns[i].classList.add('state-correct');
    } else if (btns[i] === btn && !ok) {
      btns[i].classList.add('state-wrong');
    } else {
      btns[i].classList.add('state-dim');
    }
  }

  document.getElementById('score-badge').innerHTML =
    correctCount + '&thinsp;／&thinsp;' + totalAnswered;

  document.getElementById('next-btn').classList.add('show');
}

// ─── 次の問題 ───
function nextQuestion() {
  currentQ++;
  showQuestion();
}

// ─── 結果画面 ───
function showResult() {
  document.getElementById('quiz-screen').style.display = 'none';
  var rs = document.getElementById('result-screen');
  rs.classList.add('show');

  document.getElementById('result-score-big').innerHTML =
    correctCount + '<span>&thinsp;／&thinsp;' + questionOrder.length + '</span>';

  var pct = Math.round(correctCount / questionOrder.length * 100);
  var comment = '';
  if (pct === 100)      comment = '完璧です！愛知県マスター！🎉';
  else if (pct >= 80)   comment = '素晴らしい！よく知っています！';
  else if (pct >= 60)   comment = 'なかなか良いです！もう少し！';
  else if (pct >= 40)   comment = '半分以上正解！練習あるのみ！';
  else                  comment = '難しかったですね。再挑戦しましょう！';
  document.getElementById('result-comment').textContent = comment;
}

// ─── リトライ ───
function retryQuiz() {
  correctCount = 0;
  totalAnswered = 0;
  currentQ = 0;
  questionOrder = shuffleArray(
    Array.from({ length: municipalities.length }, function(_, i) { return i; })
  );
  document.getElementById('score-badge').innerHTML = '0&thinsp;／&thinsp;0';
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('quiz-screen').style.display = '';
  showQuestion();
}

// ─── データ読み込み ───
function loadData() {
  fetch('aichi.topojson')
    .then(function(r) {
      if (!r.ok) throw new Error('fetch failed: ' + r.status);
      return r.json();
    })
    .then(function(data) {
      topoData = data;
      var geoms = data.objects.municipalities.geometries;
      municipalities = [];
      for (var i = 0; i < geoms.length; i++) {
        municipalities.push(geoms[i].properties.name);
      }
      municipalities.sort(function(a, b) { return a.localeCompare(b, 'ja'); });

      document.getElementById('loading').style.display = 'none';
      document.getElementById('quiz-screen').style.display = '';

      questionOrder = shuffleArray(
        Array.from({ length: municipalities.length }, function(_, i) { return i; })
      );
      currentQ = 0;
      correctCount = 0;
      totalAnswered = 0;
      showQuestion();
    })
    .catch(function(err) {
      document.getElementById('loading').innerHTML =
        '<div style="color:#ff6b6b;font-weight:700;text-align:center;padding:20px;">' +
        '地図データの読み込みに失敗しました。<br>' +
        'aichi.topojson が同じフォルダにあるか確認してください。<br><br>' +
        '<small>' + err.message + '</small></div>';
    });
}

// ─── イベント ───
document.getElementById('next-btn').addEventListener('click', nextQuestion);
document.getElementById('retry-btn').addEventListener('click', retryQuiz);

// ============================================================
// PWA / Service Worker 関連
// ============================================================

var swRegistration = null;
var EXPECTED_ASSET_COUNT = 5; // index.html, manifest.json, aichi.topojson, icon-192.png, icon-512.png

// ─── キャッシュ完了バナー表示 ───
function showCacheBanner(ok, msg) {
  var banner = document.getElementById('cache-banner');
  var msgEl  = document.getElementById('cache-banner-msg');
  banner.classList.remove('ok', 'warn');
  banner.classList.add(ok ? 'ok' : 'warn');
  msgEl.textContent = msg;
  banner.classList.add('show');
  clearTimeout(banner._hideTimer);
  banner._hideTimer = setTimeout(function() {
    banner.classList.remove('show');
  }, 4000);
}
document.getElementById('cache-banner-close').addEventListener('click', function() {
  document.getElementById('cache-banner').classList.remove('show');
});

// ─── 更新確認バナー表示／非表示 ───
function showUpdateBanner() {
  document.getElementById('update-banner').classList.add('show');
}
function hideUpdateBanner() {
  document.getElementById('update-banner').classList.remove('show');
}

// ─── SW からのメッセージ受信 ───
function handleSWMessage(event) {
  var data = event.data || {};

  if (data.type === 'INSTALL_RESULT') {
    if (data.failCount === 0) {
      showCacheBanner(true, '✅ オフライン準備完了！ (' + data.successCount + '/' + data.expected + '件)');
    } else {
      showCacheBanner(false, '⚠️ 一部未保存 (' + data.successCount + '/' + data.expected + '件、失敗' + data.failCount + '件)');
    }
    refreshDiagnostic();
    return;
  }

  if (data.type === 'ACTIVATE_DONE') {
    refreshDiagnostic();
    return;
  }

  if (data.type === 'DIAGNOSTIC_RESULT') {
    renderDiagnostic(data);
    return;
  }
}

// ─── 初回登録 ───
function registerSW() {
  if (!('serviceWorker' in navigator)) {
    renderDiagnosticUnsupported();
    return;
  }

  navigator.serviceWorker.addEventListener('message', handleSWMessage);

  navigator.serviceWorker.register('./service-worker.js', {
    scope: './',
    updateViaCache: 'none'
  }).then(function(reg) {
    swRegistration = reg;
    console.log('[Page] SW登録成功 scope=', reg.scope);

    // 新しいSWが見つかってインストールされたら通知バナーを出す
    reg.addEventListener('updatefound', function() {
      var newWorker = reg.installing;
      if (!newWorker) return;
      newWorker.addEventListener('statechange', function() {
        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
          // 既にcontrollerがいる状態でinstalled = 新バージョン待機中
          showUpdateBanner();
        }
      });
    });

    refreshDiagnostic();
  }).catch(function(err) {
    console.warn('[Page] SW登録失敗:', err);
    refreshDiagnostic();
  });

  // controller切り替わりを検知してリロード（更新適用時のみ発火）
  var reloaded = false;
  navigator.serviceWorker.addEventListener('controllerchange', function() {
    if (reloaded) return;
    reloaded = true;
    window.location.reload();
  });
}

// ─── 手動更新チェック（ボタン押下時のみ） ───
function manualCheckUpdate() {
  if (!swRegistration) {
    alert('Service Workerが未登録のため、更新確認できません。');
    return;
  }
  swRegistration.update().then(function() {
    console.log('[Page] update() 完了（updatefoundが発火していれば新版あり）');
    refreshDiagnostic();
  }).catch(function(err) {
    console.warn('[Page] update() 失敗:', err);
    alert('更新確認に失敗しました（オフラインの可能性があります）。');
  });
}

// ─── 「更新する」ボタン ───
document.getElementById('update-now-btn').addEventListener('click', function() {
  if (!swRegistration || !swRegistration.waiting) {
    hideUpdateBanner();
    return;
  }
  swRegistration.waiting.postMessage({ type: 'SKIP_WAITING' });
  hideUpdateBanner();
  // 実際のリロードは controllerchange イベントを待つ
});

// ─── 「あとで」ボタン ───
document.getElementById('update-later-btn').addEventListener('click', function() {
  hideUpdateBanner();
});

// ============================================================
// 診断パネル
// ============================================================

function openDiagPanel() {
  document.getElementById('diag-panel').classList.add('show');
  refreshDiagnostic();
}
function closeDiagPanel() {
  document.getElementById('diag-panel').classList.remove('show');
}
document.getElementById('diag-fab').addEventListener('click', openDiagPanel);
document.getElementById('diag-close').addEventListener('click', closeDiagPanel);
document.getElementById('diag-refresh-btn').addEventListener('click', refreshDiagnostic);
document.getElementById('diag-checkupdate-btn').addEventListener('click', manualCheckUpdate);

// SW非対応環境向け表示
function renderDiagnosticUnsupported() {
  var body = document.getElementById('diag-body');
  body.innerHTML =
    '<div class="diag-section"><h3>環境情報</h3>' +
    '<div class="diag-row"><span class="k">URL</span><span class="v">' + escapeHTML(location.href) + '</span></div>' +
    '<div class="diag-row"><span class="k">Service Worker</span><span class="v bad">非対応</span></div>' +
    '</div>';
}

// HTMLエスケープ
function escapeHTML(str) {
  return String(str).replace(/[&<>"']/g, function(c) {
    return ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[c];
  });
}

// ─── 診断データを再取得 ───
function refreshDiagnostic() {
  if (!('serviceWorker' in navigator)) {
    renderDiagnosticUnsupported();
    return;
  }

  navigator.serviceWorker.getRegistration('./').then(function(reg) {
    var swState = {
      hasController: !!navigator.serviceWorker.controller,
      scope: reg ? reg.scope : '(未登録)',
      active: reg && reg.active ? reg.active.state : 'なし',
      waiting: reg && reg.waiting ? reg.waiting.state : 'なし',
      installing: reg && reg.installing ? reg.installing.state : 'なし'
    };

    // キャッシュ診断はSW側にメッセージで問い合わせる
    if (navigator.serviceWorker.controller) {
      navigator.serviceWorker.controller.postMessage({ type: 'GET_DIAGNOSTIC' });
    } else if (reg && reg.active) {
      reg.active.postMessage({ type: 'GET_DIAGNOSTIC' });
    }

    renderDiagnosticBase(swState);
  }).catch(function(err) {
    console.warn('[Page] 診断取得失敗:', err);
  });
}

var lastSWState = null;
var lastCacheState = null;

function renderDiagnosticBase(swState) {
  lastSWState = swState;
  paintDiagnosticPanel();
}

function renderDiagnostic(cacheData) {
  lastCacheState = cacheData;
  paintDiagnosticPanel();
}

function paintDiagnosticPanel() {
  var body = document.getElementById('diag-body');
  var sw = lastSWState || {};
  var c  = lastCacheState;

  var controllerClass = sw.hasController ? 'ok' : 'bad';
  var controllerText  = sw.hasController ? 'あり' : 'なし（要注意）';

  var html = '';

  html += '<div class="diag-section"><h3>環境情報</h3>';
  html += diagRow('現在のURL', escapeHTML(location.href));
  html += diagRow('Service Worker対応', ('serviceWorker' in navigator) ? '対応' : '非対応', ('serviceWorker' in navigator) ? 'ok' : 'bad');
  html += '</div>';

  html += '<div class="diag-section"><h3>SW登録状態</h3>';
  html += diagRow('登録scope', escapeHTML(sw.scope || '-'));
  html += diagRow('active', escapeHTML(sw.active || '-'));
  html += diagRow('waiting', escapeHTML(sw.waiting || '-'));
  html += diagRow('installing', escapeHTML(sw.installing || '-'));
  html += diagRow('controller', controllerText, controllerClass);
  html += '</div>';

  if (c) {
    var countClass = (c.cachedCount === c.expected) ? 'ok' : 'warn';
    html += '<div class="diag-section"><h3>キャッシュ情報</h3>';
    html += diagRow('キャッシュ名', escapeHTML(c.cacheName));
    html += diagRow('キャッシュ済み件数', c.cachedCount + ' / ' + c.expected + ' 件', countClass);
    html += '<div class="diag-url-list">' +
      c.urls.map(function(u) { return '<div>' + escapeHTML(u) + '</div>'; }).join('') +
      '</div>';
    html += '</div>';
  } else {
    html += '<div class="diag-section"><h3>キャッシュ情報</h3>';
    html += diagRow('状態', '取得中または未取得です。「🔄 再取得」を押してください。', 'warn');
    html += '</div>';
  }

  body.innerHTML = html;
}

function diagRow(key, value, valueClass) {
  var cls = valueClass ? (' ' + valueClass) : '';
  return '<div class="diag-row"><span class="k">' + key + '</span><span class="v' + cls + '">' + value + '</span></div>';
}

// ─── 起動 ───
registerSW();
loadData();
</script>
